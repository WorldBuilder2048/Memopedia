<script src="main.js"></script>
<script>
  // генерируем список статей
  const list = document.getElementById("articlesList");

  pages.forEach(p => {
    const li = document.createElement("li");
    li.innerHTML = `<a href="${p.file}">${p.title}</a>`;
    list.appendChild(li);
  });
